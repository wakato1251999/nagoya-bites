name: Build & Deploy

on:
  push:
    branches: [main]
  schedule:
    # 毎日午前3時(JST)に自動実行してスプレッドシートの最新データを反映
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build (embed store data & update sitemap)
        run: node build.js
        env:
          HOTPEPPER_API_KEY: ${{ secrets.HOTPEPPER_API_KEY }}

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html sitemap.xml
          git diff --cached --quiet || git commit -m "chore: auto-update store data [skip ci]"
          git push
