name: 業界人レビュー投稿
description: 飲食業界で経験のある方から、名古屋の店舗へのレビューを受け付けます。編集部確認後にサイトへ掲載します。
title: "[insider-review] <店舗名>"
labels: ["review:pending", "insider-review"]
body:
  - type: markdown
    attributes:
      value: |
        ### 投稿前にご確認ください
        - このフォームは **飲食業界で経験のある方**（料理人・オーナー・支配人・フードライター等）向けです
        - 投稿内容は **編集部確認後** にサイトへ掲載します（即時公開ではありません）
        - GitHub Issue として **公開で記録** されます。本名・勤務先を載せたくない場合はペンネーム利用と肩書き欄の調整をお願いします
        - 誹謗中傷・宣伝・広告目的の投稿は掲載しません
  - type: input
    id: store-name
    attributes:
      label: 店舗名
      description: NAGOYA BITES サイトに掲載されている表記と同じでお願いします
      placeholder: 例）焼肉Nick 錦店
    validations:
      required: true
  - type: input
    id: area
    attributes:
      label: エリア
      description: サイトのモーダルから投稿した場合は自動入力されます
      placeholder: 例）栄
  - type: input
    id: hp-id
    attributes:
      label: ホットペッパーID（自動入力）
      description: サイトのモーダル CTA から開いた場合は自動で入ります。手動入力は不要です
  - type: input
    id: reviewer
    attributes:
      label: 投稿者名（ペンネーム可）
      placeholder: 例）佐藤 健 / 和食職人A
    validations:
      required: true
  - type: dropdown
    id: genre
    attributes:
      label: 経験のあるジャンル
      description: ご自身が実務経験を持つ主ジャンルを1つ選択してください
      options:
        - 和食
        - 寿司
        - イタリアン
        - フレンチ
        - 中華
        - 焼肉
        - 居酒屋
        - カフェ
        - バー
        - ラーメン
        - その他
    validations:
      required: true
  - type: input
    id: years
    attributes:
      label: 経験年数（任意）
      placeholder: 例）15年
  - type: input
    id: title
    attributes:
      label: 肩書き・所属（任意）
      description: 公開してよい表記でお願いします。非公開を希望する場合は空欄のままで
      placeholder: 例）和食店オーナーシェフ
  - type: textarea
    id: body
    attributes:
      label: レビュー本文
      description: 150〜500字程度。業界人目線で「なぜこの店か」を具体的に（食材選定・技術・接客・価格帯適正など）
      placeholder: |
        例）中落ちカルビのカット厚が 8mm 前後に揃っており、噛み切りと脂の残し方のバランスが業界標準より一段上。タレは甘さを抑えた醤油ベースで、肉の質を殺さない設計。焼き場の温度管理が安定していて、回転の速い時間帯でも火入れが崩れないのは現場力の証。
    validations:
      required: true
  - type: input
    id: visited-at
    attributes:
      label: 訪問時期（任意）
      placeholder: 例）2026-03
  - type: checkboxes
    id: consent-public
    attributes:
      label: 掲載同意（必須）
      options:
        - label: 上記内容を NAGOYA BITES および公開 GitHub Issue に掲載することに同意します
          required: true
        - label: 肩書き・所属欄に記入がある場合、それをサイト上に表示することに同意します（未記入なら不要）
